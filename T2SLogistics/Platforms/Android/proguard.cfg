# Preserve MAUI Java platform classes loaded via reflection
-keep class com.microsoft.maui.** { *; }

# Preserve Mono Android runtime classes
-keep class mono.** { *; }

# Preserve MAUI-generated bound Java classes (crc64 prefix)
-keep class crc64** { *; }

# Preserve ZXing barcode scanner classes
-keep class com.google.zxing.** { *; }
-keep class com.journeyapps.barcodescanner.** { *; }
